<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarly Abstract Review Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #f8f7f4;
            color: #2c2c2c;
            line-height: 1.7;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
            padding-bottom: 32px;
            border-bottom: 2px solid #d4c5a9;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        header p {
            font-size: 0.95rem;
            color: #6b6b6b;
            font-style: italic;
        }

        /* Input Section */
        .input-section {
            background: #fff;
            border: 1px solid #e0ddd5;
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
        }

        .input-section label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #555;
            margin-bottom: 8px;
        }

        .api-key-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .api-key-row input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d0cdc5;
            border-radius: 6px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            background: #fafaf8;
            transition: border-color 0.2s;
        }

        .api-key-row input:focus {
            outline: none;
            border-color: #8b7355;
        }

        .model-select {
            padding: 10px 14px;
            border: 1px solid #d0cdc5;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            background: #fafaf8;
            cursor: pointer;
            min-width: 180px;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 16px;
            border: 1px solid #d0cdc5;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.7;
            background: #fafaf8;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #8b7355;
        }

        textarea::placeholder {
            color: #aaa;
            font-style: italic;
        }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: #3d3428;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: #554a3a; }
        .btn-primary:disabled {
            background: #b0a898;
            cursor: not-allowed;
        }

        /* Progress Section */
        .progress-section {
            display: none;
            background: #fff;
            border: 1px solid #e0ddd5;
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
        }

        .progress-section h2 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #3d3428;
        }

        .progress-log {
            max-height: 300px;
            overflow-y: auto;
            padding: 16px;
            background: #fafaf8;
            border: 1px solid #e8e5dd;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: 'Consolas', 'Monaco', monospace;
            line-height: 1.8;
        }

        .progress-log .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #f0ede6;
        }

        .progress-log .log-entry:last-child { border-bottom: none; }

        .log-round { color: #8b7355; font-weight: 700; }
        .log-review { color: #c0392b; }
        .log-revision { color: #2471a3; }
        .log-done { color: #27ae60; font-weight: 700; }
        .log-info { color: #7f8c8d; }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #d4c5a9;
            border-top-color: #3d3428;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Results Section */
        .results-section {
            display: none;
        }

        .result-card {
            background: #fff;
            border: 1px solid #e0ddd5;
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .result-card h2 {
            font-size: 1.15rem;
            color: #3d3428;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e8e5dd;
        }

        .result-card h3 {
            font-size: 0.95rem;
            color: #555;
            margin: 16px 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .final-abstract {
            padding: 20px;
            background: #fdfcf9;
            border-left: 4px solid #8b7355;
            border-radius: 0 6px 6px 0;
            line-height: 1.9;
            font-size: 0.95rem;
        }

        .final-abstract .changed {
            font-weight: 700;
            background: #fef9e7;
            padding: 1px 3px;
            border-radius: 2px;
        }

        .revision-points {
            list-style: none;
            padding: 0;
        }

        .revision-points li {
            padding: 10px 0 10px 20px;
            border-bottom: 1px solid #f0ede6;
            position: relative;
            font-size: 0.9rem;
        }

        .revision-points li:before {
            content: '>';
            position: absolute;
            left: 0;
            color: #8b7355;
            font-weight: 700;
        }

        .revision-points li:last-child { border-bottom: none; }

        .reviewer-comments {
            list-style: none;
            padding: 0;
        }

        .reviewer-comments li {
            padding: 12px 16px;
            margin-bottom: 8px;
            background: #fafaf8;
            border-radius: 6px;
            border-left: 3px solid #c0392b;
            font-size: 0.88rem;
            font-style: italic;
        }

        .reviewer-comments li .round-tag {
            display: inline-block;
            font-size: 0.75rem;
            font-style: normal;
            font-weight: 700;
            color: #8b7355;
            margin-right: 6px;
        }

        .btn-reset {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: transparent;
            color: #8b7355;
            border: 2px solid #d4c5a9;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reset:hover {
            background: #3d3428;
            color: #fff;
            border-color: #3d3428;
        }

        .error-msg {
            color: #c0392b;
            background: #fdf0ef;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-top: 12px;
            display: none;
        }

        .round-details {
            margin-top: 16px;
        }

        .round-toggle {
            display: block;
            width: 100%;
            padding: 10px 16px;
            margin-bottom: 4px;
            background: #fafaf8;
            border: 1px solid #e8e5dd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.88rem;
            cursor: pointer;
            text-align: left;
            color: #555;
            font-weight: 600;
            transition: background 0.15s;
        }

        .round-toggle:hover { background: #f0ede6; }

        .round-content {
            display: none;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #e8e5dd;
            border-top: none;
            border-radius: 0 0 6px 6px;
            background: #fff;
            font-size: 0.85rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .round-content.open { display: block; }

        footer {
            text-align: center;
            padding: 32px 0;
            color: #aaa;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Iterative Scholarly Review</h1>
            <p>Paste your abstract. Let multiple rounds of peer review refine it.</p>
        </header>

        <!-- Input -->
        <div class="input-section" id="inputSection">
            <label for="apiKey">API Key</label>
            <div class="api-key-row">
                <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
                <select class="model-select" id="modelSelect">
                    <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                    <option value="claude-opus-4-20250514">Claude Opus 4</option>
                    <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
                </select>
            </div>

            <label for="abstractInput">Title &amp; Abstract</label>
            <textarea id="abstractInput" placeholder="Paste your title and abstract here..."></textarea>

            <button class="btn-primary" id="startBtn" onclick="startReview()">Begin Iterative Review</button>
            <div class="error-msg" id="errorMsg"></div>
        </div>

        <!-- Progress -->
        <div class="progress-section" id="progressSection">
            <h2><span class="spinner" id="progressSpinner"></span> Review in Progress</h2>
            <div class="progress-log" id="progressLog"></div>
        </div>

        <!-- Results -->
        <div class="results-section" id="resultsSection">
            <!-- Final Version -->
            <div class="result-card">
                <h2>Final Version</h2>
                <div class="final-abstract" id="finalAbstract"></div>
            </div>

            <!-- Key Revision Points -->
            <div class="result-card">
                <h2>Key Revision Points</h2>
                <ul class="revision-points" id="revisionPoints"></ul>
            </div>

            <!-- Decisive Reviewer Comments -->
            <div class="result-card">
                <h2>Decisive Reviewer Comments</h2>
                <ul class="reviewer-comments" id="reviewerComments"></ul>
            </div>

            <!-- Round Details (collapsible) -->
            <div class="result-card">
                <h2>Review Round Details</h2>
                <div class="round-details" id="roundDetails"></div>
            </div>

            <button class="btn-reset" onclick="resetAll()">Start New Review</button>
        </div>

        <footer>
            Iterative Scholarly Review Tool &mdash; Powered by Claude API
        </footer>
    </div>

    <script>
        const MAX_ROUNDS = 10;

        let rounds = []; // { review, revision }

        function log(text, cls = '') {
            const el = document.getElementById('progressLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            if (cls) entry.innerHTML = `<span class="${cls}">${text}</span>`;
            else entry.textContent = text;
            el.appendChild(entry);
            el.scrollTop = el.scrollHeight;
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }

        async function callClaude(apiKey, model, systemPrompt, userMessage) {
            const resp = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: model,
                    max_tokens: 4096,
                    system: systemPrompt,
                    messages: [{ role: 'user', content: userMessage }]
                })
            });

            if (!resp.ok) {
                const err = await resp.text();
                throw new Error(`API error ${resp.status}: ${err}`);
            }

            const data = await resp.json();
            return data.content[0].text;
        }

        async function doReview(apiKey, model, abstract, roundNum) {
            const system = `You are Reviewer ${roundNum}, an independent scholarly peer reviewer. You have NO knowledge of any previous reviews or revisions. You are seeing this abstract for the first time.

Your task: Provide a rigorous, constructive peer review of the following abstract. Be specific and actionable.

Structure your review as:
1. **Overall Assessment**: Brief overall impression (2-3 sentences)
2. **Strengths**: Key strengths (bullet points)
3. **Weaknesses & Required Revisions**: Specific issues that must be addressed (numbered list, be precise about what needs changing and why)
4. **Minor Suggestions**: Optional improvements (bullet points)
5. **Verdict**: One of [Accept / Minor Revision / Major Revision / Reject] with brief justification`;

            return await callClaude(apiKey, model, system, `Please review this abstract:\n\n${abstract}`);
        }

        async function doRevision(apiKey, model, currentAbstract, review, roundNum) {
            const system = `You are a diligent academic author revising your abstract based on peer review feedback.

Rules:
- Address EVERY specific criticism raised by the reviewer
- Maintain academic rigor and clarity
- Preserve the core contribution and findings
- Do not add information that wasn't implied in the original
- Keep the abstract concise and well-structured

Output ONLY the revised title and abstract text, nothing else. No explanations, no meta-commentary.`;

            return await callClaude(apiKey, model, system,
                `Current abstract:\n\n${currentAbstract}\n\n---\n\nPeer Review (Round ${roundNum}):\n\n${review}\n\n---\n\nPlease revise the abstract to address the reviewer's feedback. Output only the revised title and abstract.`);
        }

        async function checkConvergence(apiKey, model, previousVersion, revisedVersion, review) {
            const system = `You are a meta-reviewer assessing whether an abstract has converged to a satisfactory state after revision.

Analyze the review feedback and the changes made. Determine if further revision rounds would yield meaningful improvements.

Respond with EXACTLY one of:
- "CONTINUE" if substantive issues remain or the revision didn't adequately address major concerns
- "CONVERGED" if the abstract has reached a high quality state where further revision would only yield marginal or cosmetic changes

Follow your verdict with a brief one-sentence explanation.`;

            const result = await callClaude(apiKey, model, system,
                `Previous version:\n${previousVersion}\n\n---\n\nLatest review:\n${review}\n\n---\n\nRevised version:\n${revisedVersion}`);

            return result.trim().startsWith('CONVERGED');
        }

        async function generateFinalReport(apiKey, model, originalAbstract, finalAbstract, allRounds) {
            const roundsSummary = allRounds.map((r, i) =>
                `Round ${i + 1} Review:\n${r.review}\n\nRound ${i + 1} Revision:\n${r.revision}`
            ).join('\n\n---\n\n');

            const system = `You are a scholarly editor preparing a final report on an iterative peer review process.

You must return a JSON object with exactly these fields:
{
  "finalVersionHtml": "The final abstract with <b>changed parts</b> marked in bold tags compared to the ORIGINAL. Only bold the phrases/sentences that meaningfully differ from the original.",
  "revisionPoints": ["Array of key revision points - the most important changes made throughout the process"],
  "decisiveComments": [{"round": 1, "comment": "The specific reviewer comment that drove the most impactful change"}, ...]
}

Return ONLY valid JSON, no markdown code blocks, no explanation.`;

            const result = await callClaude(apiKey, model, system,
                `Original abstract:\n${originalAbstract}\n\n---\n\nFinal abstract:\n${finalAbstract}\n\n---\n\nFull review history:\n${roundsSummary}`);

            // Try to extract JSON from the response
            let jsonStr = result.trim();
            // Remove markdown code block if present
            if (jsonStr.startsWith('```')) {
                jsonStr = jsonStr.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '');
            }
            return JSON.parse(jsonStr);
        }

        async function startReview() {
            hideError();
            const apiKey = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('modelSelect').value;
            const abstract = document.getElementById('abstractInput').value.trim();

            if (!apiKey) return showError('Please enter your API key.');
            if (!abstract) return showError('Please paste your abstract.');

            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = true;

            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('progressLog').innerHTML = '';
            rounds = [];

            let currentAbstract = abstract;

            try {
                for (let i = 1; i <= MAX_ROUNDS; i++) {
                    log(`━━━ Round ${i} ━━━`, 'log-round');

                    // Review
                    log(`Reviewer ${i} is examining the abstract...`, 'log-review');
                    const review = await doReview(apiKey, model, currentAbstract, i);
                    log(`Reviewer ${i} submitted feedback.`, 'log-review');

                    // Revision
                    log('Author is revising based on feedback...', 'log-revision');
                    const revision = await doRevision(apiKey, model, currentAbstract, review, i);
                    log('Revision complete.', 'log-revision');

                    rounds.push({ review, revision });

                    // Check convergence
                    log('Checking if further revision is needed...', 'log-info');
                    const converged = await checkConvergence(apiKey, model, currentAbstract, revision, review);

                    currentAbstract = revision;

                    if (converged) {
                        log(`Converged after ${i} round(s). No further revision needed.`, 'log-done');
                        break;
                    }

                    if (i === MAX_ROUNDS) {
                        log(`Reached maximum ${MAX_ROUNDS} rounds. Finalizing.`, 'log-done');
                    } else {
                        log('Substantive improvements still possible. Continuing...', 'log-info');
                    }
                }

                // Generate final report
                log('Generating final report...', 'log-info');
                const report = await generateFinalReport(apiKey, model, abstract, currentAbstract, rounds);

                document.getElementById('progressSpinner').style.display = 'none';
                log('Done!', 'log-done');

                renderResults(report, abstract, currentAbstract);

            } catch (e) {
                log(`Error: ${e.message}`, 'log-review');
                showError(e.message);
            }

            startBtn.disabled = false;
        }

        function renderResults(report, originalAbstract, finalAbstract) {
            // Final abstract with bold changes
            document.getElementById('finalAbstract').innerHTML = report.finalVersionHtml;

            // Revision points
            const rpEl = document.getElementById('revisionPoints');
            rpEl.innerHTML = '';
            for (const point of report.revisionPoints) {
                const li = document.createElement('li');
                li.textContent = point;
                rpEl.appendChild(li);
            }

            // Decisive comments
            const rcEl = document.getElementById('reviewerComments');
            rcEl.innerHTML = '';
            for (const item of report.decisiveComments) {
                const li = document.createElement('li');
                li.innerHTML = `<span class="round-tag">[Round ${item.round}]</span> ${escapeHtml(item.comment)}`;
                rcEl.appendChild(li);
            }

            // Round details (collapsible)
            const rdEl = document.getElementById('roundDetails');
            rdEl.innerHTML = '';
            for (let i = 0; i < rounds.length; i++) {
                const btn = document.createElement('button');
                btn.className = 'round-toggle';
                btn.textContent = `Round ${i + 1} — Review & Revision`;
                btn.onclick = function() {
                    const content = this.nextElementSibling;
                    content.classList.toggle('open');
                };
                rdEl.appendChild(btn);

                const content = document.createElement('div');
                content.className = 'round-content';
                content.textContent = `── Review ──\n\n${rounds[i].review}\n\n── Revision ──\n\n${rounds[i].revision}`;
                rdEl.appendChild(content);
            }

            document.getElementById('resultsSection').style.display = 'block';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function resetAll() {
            document.getElementById('abstractInput').value = '';
            document.getElementById('progressSection').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('progressLog').innerHTML = '';
            document.getElementById('progressSpinner').style.display = 'inline-block';
            rounds = [];
            hideError();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
